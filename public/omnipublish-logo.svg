<?xml version="1.0" encoding="UTF-8"?>
<svg width="1800" height="520" viewBox="0 0 1800 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OmniPublish Logo</title>
  <desc id="desc">Network-style content distribution logo with OmniPublish wordmark.</desc>
  <defs>
