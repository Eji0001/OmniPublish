<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OmniPublish Brand Assets</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background:#0b1020; color:#eef3ff; }
    main { max-width: 920px; margin: 0 auto; padding: 40px 20px 64px; }
    h1 { margin: 0 0 8px; font-size: 32px; }
    p { margin: 0 0 24px; color:#b7c4e3; }
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    .card { background:#111a33; border:1px solid #263257; border-radius:16px; padding:16px; }
    .card h2 { margin: 0 0 8px; font-size: 18px; }
    .links { display:flex; gap:12px; flex-wrap:wrap; margin-top:12px; }
    .card a { color:#8cc7ff; text-decoration:none; }
    img { width: 100%; height: auto; border-radius:12px; background:#fff; }
    .dark { background:#060a14; }
    .small { font-size: 12px; color:#9db0d6; margin-top: 10px; line-height: 1.5; }
  </style>
</head>
<body>
  <main>
    <h1>OmniPublish Brand Assets</h1>
    <p>Download the official logo set for web, app icons, dark backgrounds, and browser tabs.</p>
    <div class="grid">
      <section class="card">
        <h2>Full Logo</h2>
        <img src="/omnipublish-logo.svg" alt="OmniPublish logo">
        <div class="links">
          <a href="/omnipublish-logo.svg" download>SVG</a>
          <a href="/omnipublish-logo.png" download>PNG</a>
        </div>
      </section>
      <section class="card">
        <h2>Square Icon</h2>
        <img src="/omnipublish-logo-square.svg" alt="OmniPublish square icon">
        <div class="links">
          <a href="/omnipublish-logo-square.svg" download>SVG</a>
          <a href="/omnipublish-logo-square.png" download>PNG</a>
        </div>
      </section>
      <section class="card dark">
        <h2>Dark Version</h2>
        <img src="/omnipublish-logo-dark.svg" alt="OmniPublish dark logo">
        <div class="links">
          <a href="/omnipublish-logo-dark.svg" download>SVG</a>
          <a href="/omnipublish-logo-dark.png" download>PNG</a>
        </div>
      </section>
      <section class="card">
        <h2>Favicon</h2>
        <img src="/favicon.svg" alt="OmniPublish favicon" style="max-width:180px;margin:0 auto;display:block;background:transparent;">
        <div class="links">
          <a href="/favicon.svg" download>SVG</a>
          <a href="/favicon.png" download>PNG</a>
          <a href="/favicon.ico" download>ICO</a>
        </div>
        <div class="small">Use the favicon files for browser tabs and the square PNG for upload forms that ask for a logo.</div>
      </section>
    </div>
  </main>
</body>
</html>
