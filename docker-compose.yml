# ============================================================
# docker-compose.yml — OmniPublish local development stack
# Usage: docker compose up -d
# ============================================================

version: '3.9'

services:

  # ── API Server ──────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: omnipublish-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://omnipublish:secret@postgres:5432/omnipublish
      REDIS_URL: redis://redis:6379
    env_file: .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - omnipublish-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/v1/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── PostgreSQL ──────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: omnipublish-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       omnipublish
      POSTGRES_USER:     omnipublish
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - omnipublish-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnipublish -d omnipublish"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (rate limit / cache / sessions) ─
  redis:
    image: redis:7-alpine
    container_name: omnipublish-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass redissecret
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - omnipublish-net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redissecret", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Nginx reverse proxy (local TLS simulation) ─
  nginx:
    image: nginx:1.27-alpine
    container_name: omnipublish-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - omnipublish-net

volumes:
  postgres_data:
  redis_data:

networks:
  omnipublish-net:
    driver: bridge

---
# ============================================================
# Dockerfile
# ============================================================
# syntax=docker/dockerfile:1

# ── Base ─────────────────────────────────
FROM node:20-alpine AS base
WORKDIR /app
RUN apk add --no-cache dumb-init curl
COPY package*.json ./

# ── Development ──────────────────────────
FROM base AS development
RUN npm ci --include=dev
COPY . .
EXPOSE 4000
CMD ["dumb-init", "node", "--watch", "server.js"]

# ── Build / CI ────────────────────────────
FROM base AS build
RUN npm ci --omit=dev
COPY . .

# ── Production ───────────────────────────
FROM node:20-alpine AS production
WORKDIR /app
# Security: run as non-root
RUN addgroup -S app && adduser -S app -G app
RUN apk add --no-cache dumb-init curl
COPY --chown=app:app --from=build /app/node_modules ./node_modules
COPY --chown=app:app . .
USER app
EXPOSE 4000
# dumb-init: proper signal handling, no zombie processes
CMD ["dumb-init", "node", "server.js"]
